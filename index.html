<!DOCTYPE html>
<html class="light" lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Interpreter Connect | Industrial Session Initialization</title>
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />
  <script>
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          colors: {
            tertiary: "#3d1400",
            outline: "#74777f",
            "surface-container": "#dbf1fe",
            "on-tertiary-fixed-variant": "#7a3000",
            "secondary-fixed-dim": "#adcbda",
            "on-secondary": "#ffffff",
            "tertiary-fixed-dim": "#ffb692",
            "error-container": "#ffdad6",
            "on-error": "#ffffff",
            "on-tertiary-container": "#ff7726",
            "on-tertiary-fixed": "#341100",
            "on-background": "#071e27",
            secondary: "#466270",
            primary: "#1B365D",
            "surface-variant": "#cfe6f2",
            "surface-container-highest": "#cfe6f2",
            "on-secondary-container": "#4a6774",
            "on-primary-fixed-variant": "#2e476f",
            "tertiary-container": "#5f2400",
            "on-primary-fixed": "#001b3d",
            "surface-container-low": "#e6f6ff",
            "inverse-primary": "#aec7f7",
            background: "#f3faff",
            "surface-dim": "#c7dde9",
            error: "#ba1a1a",
            "surface-container-high": "#d5ecf8",
            "surface-bright": "#f3faff",
            "on-surface-variant": "#44474e",
            "on-secondary-fixed": "#001f2a",
            "outline-variant": "#c4c6cf",
            "primary-fixed": "#d6e3ff",
            "on-error-container": "#93000a",
            "inverse-surface": "#1e333c",
            "inverse-on-surface": "#dff4ff",
            "tertiary-fixed": "#ffdbcb",
            "primary-fixed-dim": "#aec7f7",
            "secondary-fixed": "#c9e7f7",
            surface: "#f3faff",
            "surface-tint": "#465f88",
            "on-tertiary": "#ffffff",
            "on-primary-container": "#87a0cd",
            "surface-container-lowest": "#ffffff",
            "primary-container": "#1b365d",
            "on-secondary-fixed-variant": "#2e4b57",
            "on-primary": "#ffffff",
            "secondary-container": "#c6e4f4",
            "on-surface": "#071e27"
          },
          fontFamily: {
            headline: ["Manrope", "sans-serif"],
            body: ["Inter", "sans-serif"],
            label: ["Inter", "sans-serif"]
          },
          borderRadius: {
            DEFAULT: "0.125rem",
            lg: "0.25rem",
            xl: "0.5rem",
            full: "9999px"
          }
        }
      }
    };
  </script>
  <style>
    :root {
      --brand-blue: #1b365d;
      --brand-blue-soft: #2f5a95;
      --panel-shadow: 0 28px 72px -22px rgba(4, 18, 39, 0.55);
    }
    .material-symbols-outlined {
      font-variation-settings: "FILL" 0, "wght" 400, "GRAD" 0, "opsz" 24;
    }
    .industrial-overlay {
      background:
        radial-gradient(circle at 16% 18%, rgba(88, 137, 199, 0.26), rgba(88, 137, 199, 0) 38%),
        radial-gradient(circle at 84% 84%, rgba(66, 117, 177, 0.22), rgba(66, 117, 177, 0) 34%),
        linear-gradient(130deg, rgba(27, 54, 93, 0.82) 0%, rgba(7, 30, 39, 0.9) 72%);
    }
    .glass-card {
      background: linear-gradient(165deg, rgba(255, 255, 255, 0.94), rgba(239, 248, 255, 0.9));
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      box-shadow: var(--panel-shadow);
      animation: cardIn 0.55s cubic-bezier(0.2, 0.9, 0.2, 1) both;
      border-radius: 18px;
    }
    .hero-title {
      animation: fadeUp 0.6s cubic-bezier(0.2, 0.9, 0.2, 1) 0.08s both;
    }
    .hero-subtitle {
      animation: fadeUp 0.6s cubic-bezier(0.2, 0.9, 0.2, 1) 0.18s both;
    }
    .hero-icon {
      animation: fadeUp 0.6s cubic-bezier(0.2, 0.9, 0.2, 1) both, softFloat 3.5s ease-in-out 0.7s infinite;
    }
    .brand-logo {
      animation: none;
    }
    .auth-field input {
      transition: border-color 0.18s ease, box-shadow 0.18s ease, background-color 0.18s ease, transform 0.18s ease;
      border-radius: 12px;
    }
    .auth-field input:focus {
      background: #ffffff;
      border-color: var(--brand-blue) !important;
      box-shadow: 0 0 0 4px rgba(27, 54, 93, 0.14);
      transform: translateY(-1px);
    }
    .login-cta {
      position: relative;
      overflow: hidden;
      border-radius: 12px;
      background: linear-gradient(135deg, #1b365d, #29518a);
      box-shadow: 0 12px 26px -14px rgba(27, 54, 93, 0.95);
      transition: transform 0.18s ease, box-shadow 0.18s ease, filter 0.18s ease;
    }
    .login-cta::after {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(100deg, transparent 20%, rgba(255, 255, 255, 0.26) 50%, transparent 80%);
      transform: translateX(-130%);
      transition: transform 0.5s ease;
      pointer-events: none;
    }
    .login-cta:hover {
      transform: translateY(-1px);
      box-shadow: 0 16px 34px -16px rgba(27, 54, 93, 1);
      filter: brightness(1.03);
    }
    .login-cta:hover::after {
      transform: translateX(130%);
    }
    .login-cta:active {
      transform: translateY(0);
    }
    .status-strip {
      animation: fadeUp 0.6s ease 0.25s both;
    }
    .login-register {
      animation: fadeUp 0.6s ease 0.2s both;
    }
    .bg-parallax {
      animation: slowZoom 13s ease-in-out infinite alternate;
    }
    #loader {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(255, 255, 255, 0.45);
      z-index: 9999;
      align-items: center;
      justify-content: center;
      backdrop-filter: blur(2px);
    }
    #loader::before {
      content: "";
      width: 58px;
      height: 58px;
      border-radius: 50%;
      border: 6px solid #dce7f7;
      border-top-color: #1f4e8c;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(12px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeDown {
      from { opacity: 0; transform: translateY(-10px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes cardIn {
      from { opacity: 0; transform: translateY(16px) scale(0.985); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }
    @keyframes softFloat {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-4px); }
    }
    @keyframes slowZoom {
      from { transform: scale(1); }
      to { transform: scale(1.045); }
    }
    .swal-login-success-popup {
      border-radius: 16px !important;
      border: 1px solid #d5e3f6 !important;
      box-shadow: 0 22px 48px rgba(7, 28, 54, 0.22) !important;
      padding: 18px 16px 14px !important;
    }
    .swal-login-success-title {
      color: #173d6d !important;
      font-family: "Manrope", sans-serif !important;
      font-size: 28px !important;
      font-weight: 800 !important;
      margin-bottom: 2px !important;
    }
    .swal-login-success-html {
      color: #395a80 !important;
      font-size: 15px !important;
      font-weight: 600 !important;
      margin-top: 4px !important;
      margin-bottom: 6px !important;
    }
    .swal-login-success-confirm {
      min-width: 120px !important;
      height: 42px !important;
      border-radius: 11px !important;
      border: 1px solid #1a447c !important;
      background: linear-gradient(135deg, #1b365d, #29518a) !important;
      color: #fff !important;
      font-family: "Inter", sans-serif !important;
      font-size: 14px !important;
      font-weight: 700 !important;
      box-shadow: 0 12px 24px -14px rgba(27, 54, 93, 0.95) !important;
      transition: transform 0.16s ease, filter 0.16s ease !important;
    }
    .swal-login-success-confirm:hover {
      transform: translateY(-1px);
      filter: brightness(1.03);
    }
  </style>
</head>
<body class="font-body bg-background text-on-background min-h-screen flex flex-col overflow-x-hidden overflow-y-hidden">
  <div class="fixed top-4 left-5 z-30 brand-logo">
    <img src="images/company-logo.png" alt="Company Logo" class="h-6 w-auto object-contain drop-shadow-[0_4px_10px_rgba(0,0,0,0.35)]" />
  </div>
  <main class="relative flex-grow flex items-center justify-center overflow-hidden">
    <div class="absolute inset-0 z-0">
      <img alt="Interpreter Booking System Illustration" class="w-full h-full object-cover bg-parallax" src="images/login-bg3.png" />
      <div class="absolute inset-0 industrial-overlay"></div>
    </div>

    <div class="relative z-10 w-full max-w-[1120px] grid grid-cols-1 lg:grid-cols-2 items-center gap-8 px-6 py-4">
      <div class="hidden lg:block text-white space-y-0 lg:-mt-24">
        <div class="hero-icon inline-flex items-center justify-center -ml-14">
          <img src="images/Icon.png" alt="Interpreter Icon" class="w-64 h-64 object-contain" />
        </div>
        <div class="-mt-32 space-y-0">
          <h1 class="hero-title -mt-14 font-headline font-extrabold text-6xl tracking-tighter uppercase leading-[0.86]">Interpreter <br />Connect</h1>
          <div class="h-1 w-24 bg-primary-container"></div>
          <p class="hero-subtitle font-label text-lg uppercase tracking-widest text-on-primary-container font-semibold">Interpreter Booking System</p>
        </div>
      </div>

      <div class="w-full max-w-md mx-auto">
        <div class="lg:hidden mb-10 text-center">
          <div class="inline-flex items-center justify-center mb-6 -ml-9">
            <img src="images/Icon.png" alt="Interpreter Icon" class="w-40 h-40 object-contain" />
          </div>
          <h1 class="font-headline font-extrabold text-4xl tracking-tighter text-white uppercase mb-1 leading-[0.9]">Interpreter Connect</h1>
          <p class="font-label text-sm uppercase tracking-[0.2em] text-on-tertiary-container font-bold">Interpreter Booking System</p>
        </div>

        <div class="glass-card rounded-lg p-8 lg:p-9 shadow-[0_24px_48px_-12px_rgba(0,0,0,0.5)] border border-white/40">
          <form id="loginForm" class="space-y-6" novalidate>
            <div class="space-y-2 mb-6">
              <h2 class="font-headline text-2xl font-bold text-primary">System Access</h2>
            </div>

            <div class="space-y-5">
              <div class="auth-field">
                <label for="username" class="block font-label text-[0.6875rem] uppercase tracking-wider text-secondary font-bold mb-2">Username</label>
                <div class="relative group">
                  <span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline group-focus-within:text-primary transition-colors">terminal</span>
                  <input id="username" name="username" type="text" required autocomplete="username" placeholder="Enter username" class="w-full pl-12 pr-4 py-4 bg-white/50 border border-outline-variant/30 focus:border-primary focus:ring-1 focus:ring-primary rounded text-on-surface font-medium placeholder:text-outline/40 transition-all outline-none" />
                </div>
              </div>

              <div class="auth-field">
                <label for="password" class="block font-label text-[0.6875rem] uppercase tracking-wider text-secondary font-bold mb-2">Password</label>
                <div class="relative group">
                  <span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline group-focus-within:text-primary transition-colors">key</span>
                  <input id="password" name="password" type="password" required autocomplete="current-password" placeholder="............." class="w-full pl-12 pr-4 py-4 bg-white/50 border border-outline-variant/30 focus:border-primary focus:ring-1 focus:ring-primary rounded text-on-surface font-medium placeholder:text-outline/40 transition-all outline-none" />
                </div>
              </div>
            </div>

            <button id="loginBtn" type="submit" class="login-cta w-full py-4 text-white font-headline font-bold text-base shadow-lg active:translate-y-0.5 transition-all flex items-center justify-center gap-3 disabled:opacity-70 disabled:cursor-not-allowed">
              <span>LOGIN</span>
              <span class="material-symbols-outlined text-xl">login</span>
            </button>
          </form>

          <div class="login-register mt-5 text-center text-sm text-secondary">
            Don't have an account?
            <a href="register.html" class="font-semibold text-primary hover:underline">Register</a>
          </div>

          <div class="status-strip mt-8 pt-6 border-t border-outline-variant/30 flex items-center justify-between">
            <div class="flex items-center gap-2">
              <span class="w-2 h-2 rounded-full bg-emerald-500 animate-pulse shadow-[0_0_8px_rgba(16,185,129,0.6)]"></span>
              <span class="font-label text-[10px] uppercase font-bold text-secondary tracking-widest">System Node: Online</span>
            </div>
            <span class="font-label text-[10px] text-outline font-medium">v2.0</span>
          </div>
        </div>
      </div>
    </div>
  </main>

  <footer class="bg-primary w-full border-t border-white/10 py-3 px-8 flex items-center justify-center z-20">
    <div class="font-['Inter'] text-[0.625rem] md:text-[0.6875rem] text-white text-center">
      © 2026 Resonac Materials (Thailand) Co., Ltd. - RMT Interpreter Booking System Developed by IT Department
    </div>
  </footer>

  <div id="loader"></div>

  <script>
    const API_URL = "https://script.google.com/macros/s/AKfycbw8ZWi76fqqPWpefMsxJvFGf1bvbsutVr9wdwsPtsEq4xxqiL9tw-QpzgFbUnNoKmc/exec";

    function showLoader() {
      document.getElementById("loader").style.display = "flex";
    }
    function hideLoader() {
      document.getElementById("loader").style.display = "none";
    }

    document.getElementById("loginForm").addEventListener("submit", async (e) => {
      e.preventDefault();
      const username = document.getElementById("username").value.trim();
      const password = document.getElementById("password").value.trim();
      if (!username || !password) {
        Swal.fire("Warning", "Please enter username and password", "warning");
        return;
      }

      const loginBtn = document.getElementById("loginBtn");
      loginBtn.disabled = true;

      try {
        const msgUint8 = new TextEncoder().encode(password);
        const hashBuffer = await crypto.subtle.digest("SHA-256", msgUint8);
        const hashArray = Array.from(new Uint8Array(hashBuffer));
        const passwordHash = hashArray.map((b) => b.toString(16).padStart(2, "0")).join("");

        const form = new URLSearchParams();
        form.append("page", "loginUser");
        form.append("username", username);
        form.append("passwordHash", passwordHash);

        showLoader();
        const res = await fetch(API_URL, { method: "POST", body: form });
        const data = await res.json();
        hideLoader();

        if (!data.success) {
          Swal.fire("Error", data.message || "Login failed", "error");
          loginBtn.disabled = false;
          return;
        }

        localStorage.setItem("loggedInUser", JSON.stringify(data.user));
        await Swal.fire({
          icon: "success",
          title: "Success",
          html: "",
          confirmButtonText: "OK",
          showConfirmButton: true,
          allowOutsideClick: false,
          allowEscapeKey: false,
          customClass: {
            popup: "swal-login-success-popup",
            title: "swal-login-success-title",
            htmlContainer: "swal-login-success-html",
            confirmButton: "swal-login-success-confirm"
          }
        });

        const role = String(data.user?.role || "").toLowerCase();
        if (role === "admin") window.location.href = "dashboard.html";
        else if (role === "interpreter") window.location.href = "dashboardInterpreter.html";
        else window.location.href = "dashboard.html";
      } catch (err) {
        hideLoader();
        Swal.fire("Error", err.message || "Network error", "error");
        loginBtn.disabled = false;
      }
    });
  </script>
</body>
</html>
